name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            pkg-config \
            wget

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test

  desktop:
    name: Desktop
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run desktop lint
        working-directory: apps/desktop
        run: npm run lint

      - name: Run desktop tests
        working-directory: apps/desktop
        run: npm test

      - name: Build Electron bundles
        working-directory: apps/desktop
        run: npm run electron:build

      - name: Build native desktop sidecar
        run: cargo build -p neverwrite-native-backend

      - name: Run vault/editor smoke
        working-directory: apps/desktop
        run: npm run electron:vault-editor:smoke

      - name: Run AI runtime smoke
        working-directory: apps/desktop
        run: npm run electron:ai-runtime:smoke

  web-clipper:
    name: Web Clipper
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web-clipper/pnpm-lock.yaml

      - name: Install web clipper dependencies
        working-directory: apps/web-clipper
        run: pnpm install --frozen-lockfile

      - name: Run web clipper checks
        working-directory: apps/web-clipper
        run: pnpm run check
